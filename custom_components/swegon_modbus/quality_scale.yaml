rules:
  # ---------------------------------------------------------------------------
  # Bronze (mandatory for all integrations)
  # ---------------------------------------------------------------------------
  action-setup:
    status: exempt
    comment: Integration does not register custom service actions.
  appropriate-polling: done
  brands:
    status: exempt
    comment: Custom component — not submitted to the HA core brands repository.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No custom service actions are registered.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal: done
  entity-event-setup:
    status: exempt
    comment: Entities use CoordinatorEntity; no additional event subscriptions needed.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ---------------------------------------------------------------------------
  # Silver
  # ---------------------------------------------------------------------------
  action-exceptions:
    status: exempt
    comment: No custom service actions registered.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: >
      SwegonModbusEntity (entity.py) tracks a per-entity _unavailable_logged
      flag. When the coordinator update fails, available() logs an info message
      once and sets the flag. When the coordinator recovers, available() logs
      another info message and resets the flag.
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Modbus uses no credentials; reauthentication is not applicable.
  test-coverage: done

  # ---------------------------------------------------------------------------
  # Gold
  # ---------------------------------------------------------------------------
  devices: done
  diagnostics:
    status: done
    comment: diagnostics.py implements async_get_config_entry_diagnostics.
  discovery:
    status: exempt
    comment: Modbus is a point-to-point protocol with no network discovery mechanism.
  discovery-update-info:
    status: exempt
    comment: Modbus is a point-to-point protocol with no network discovery mechanism.
  docs-data-update: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Each config entry targets a single fixed unit; no dynamic device discovery.
  entity-category:
    status: done
    comment: >
      CONFIG category used for all configuration/settings entities. Diagnostic
      category used for status-only sensors. Main operational entities have no
      category.
  entity-device-class: done
  entity-disabled-by-default:
    status: done
    comment: >
      Many diagnostic and alarm entities are disabled by default
      (entity_registry_enabled_default=False) to reduce clutter. This includes
      all T1–T9 sensor-failure sensors and their unconfirmed variants, as well
      as most alarm-unconfirmed sensors.
  entity-translations: done
  exception-translations:
    status: done
    comment: strings.json exceptions section covers all HomeAssistantError messages.
  icon-translations:
    status: exempt
    comment: No state-dependent icon overrides are needed for this integration.
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No user-resolvable repair issues are generated by this integration.
  stale-devices:
    status: exempt
    comment: Single fixed device per config entry; no stale device scenario.

  # ---------------------------------------------------------------------------
  # Platinum
  # ---------------------------------------------------------------------------
  async-dependency: done
  inject-websession:
    status: exempt
    comment: Modbus uses a serial socket, not HTTP sessions.
  strict-typing: done
