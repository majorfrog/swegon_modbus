# mypy configuration for the swegon_modbus custom component.
#
# Mirrors the Home Assistant core mypy.ini settings so that strict-typing
# checks are aligned with HA quality-scale requirements.
#
# IMPORTANT: Run mypy from within the HA virtual environment and ensure
# /workspaces/core (or your local HA core checkout) is the mypy_path so that
# the homeassistant package is resolvable. See CONTRIBUTING.md for details.

[mypy]
python_version = 3.13
platform = linux
# Point at the HA core source so 'import homeassistant.*' is resolved.
# Adjust if your HA core checkout lives elsewhere.
mypy_path = /workspaces/core
show_error_codes = true
follow_imports = normal
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
enable_error_code = deprecated, ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = false
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true

[mypy-pymodbus.*]
ignore_missing_imports = true
